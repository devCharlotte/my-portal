<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my portal</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    body { overflow-x: hidden; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.55fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }
    .hero-main {
      position: relative;
      overflow: hidden;
      padding: clamp(24px, 5vw, 46px);
    }
    .hero-main::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -85px;
      width: 240px;
      height: 240px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,143,199,0.42), rgba(139,215,255,0.38));
    }
    .eyebrow {
      position: relative;
      z-index: 1;
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
      border: 1px solid var(--my-line);
      color: var(--my-muted);
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2.6rem, 8vw, 5.8rem);
      line-height: 0.9;
      letter-spacing: -0.06em;
      color: #172033;
    }
    .side-note {
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }
    .side-note .value { font-size: 2rem; line-height: 1.1; letter-spacing: -0.05em; }
    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .chapter-link {
      min-height: 240px;
      padding: 22px;
      color: var(--my-ink);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }
    .chapter-link:hover {
      transform: translateY(-4px);
      filter: brightness(1.02);
      box-shadow: 0 24px 50px rgba(94,120,160,0.2);
    }
    .icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(120,144,180,0.18);
      font-size: 1.7rem;
    }
    .chapter-title {
      margin: 22px 0 8px;
      font-size: 1.5rem;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }
    .chapter-desc {
      margin: 0;
      color: var(--my-muted);
      font-size: 0.92rem;
      line-height: 1.65;
    }
    @media (max-width: 760px) {
      .hero, .chapter-grid { grid-template-columns: 1fr; }
      .chapter-link { min-height: 190px; }
    }
  </style>
</head>
<body class="myworkspace-soft">
  <main class="myworkspace-page">
    <section class="hero">
      <div class="myworkspace-card hero-main">
        <div class="eyebrow">my portal</div>
        <h1>my portal</h1>
      </div>
      <aside class="myworkspace-card side-note">
        <div class="value">workΉβΑ gameΉζΕ<br>ΊΧε Ά││ΉΩΡΉΕε ΉΩ░Ά▓░ΊΨΙΉΛ╡ΈΜΙΈΜ╣</div>
      </aside>
    </section>

    <section class="chapter-grid" aria-label="portal chapters">
      <a class="myworkspace-card chapter-link" href="work/">
        <div>
          <div class="icon">ΏθΨξΎ╕Π</div>
          <h2 class="chapter-title">Work</h2>
          <p class="chapter-desc">Workspace, Research, Teaching Assistant, Wellness, Newspaper, Coursework, Instructor</p>
        </div>
      </a>

      <a class="myworkspace-card chapter-link" href="game/">
        <div>
          <div class="icon">ΏθΟχ</div>
          <h2 class="chapter-title">Game</h2>
          <p class="chapter-desc">JoonHee's games and driving practice</p>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
