<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My APK Extension</title>
  <link rel="stylesheet" href="../shared.css" />
  <style>
body { overflow-x: hidden; }
.hero {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.55fr);
  gap: 18px;
  align-items: stretch;
  margin-bottom: 18px;
}
.hero-main {
  position: relative;
  overflow: hidden;
  padding: clamp(24px, 5vw, 46px);
}
.hero-main::after {
  content: "";
  position: absolute;
  right: -70px;
  top: -85px;
  width: 240px;
  height: 240px;
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(255,143,199,0.42), rgba(139,215,255,0.38));
}
.eyebrow {
  position: relative;
  z-index: 1;
  display: inline-flex;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.62);
  border: 1px solid var(--my-line);
  color: var(--my-muted);
  font-size: 0.9rem;
  margin-bottom: 14px;
}
h1 {
  position: relative;
  z-index: 1;
  margin: 0;
  font-size: clamp(2.5rem, 7vw, 5.6rem);
  line-height: 0.95;
  letter-spacing: -0.06em;
  color: #172033;
}
.side-note {
  padding: 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 18px;
}
.side-note .value { font-size: 2rem; line-height: 1.1; }
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 14px;
}
.workspace-link {
  min-height: 210px;
  padding: 18px;
  color: var(--my-ink);
  text-decoration: none;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
}
.workspace-link:hover {
  transform: translateY(-4px);
  filter: brightness(1.02);
  box-shadow: 0 24px 50px rgba(94,120,160,0.2);
}
.icon {
  width: 48px;
  height: 48px;
  display: grid;
  place-items: center;
  border-radius: 17px;
  background: rgba(255,255,255,0.68);
  border: 1px solid rgba(120,144,180,0.18);
  font-size: 1.55rem;
}
.icon-image {
  width: 48px;
  height: 48px;
  border-radius: 17px;
  object-fit: cover;
  background: rgba(255,255,255,0.68);
  border: 1px solid rgba(120,144,180,0.18);
}
.workspace-title {
  margin: 18px 0 7px;
  font-size: 1.26rem;
  line-height: 1.2;
  letter-spacing: -0.04em;
}
.created {
  margin-top: 18px;
  color: #7b8190;
  font-size: 0.82rem;
  line-height: 1.5;
}
@media (max-width: 980px) {
  .hero { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .tool-grid { grid-template-columns: 1fr; }
  .workspace-link { min-height: 180px; }
}
  </style>
</head>
<body class="myworkspace-soft">
  <nav class="myworkspace-topnav">
    <a class="myworkspace-home" href="../">← my workspace</a>
  </nav>
  <main class="myworkspace-page">
    <section class="hero">
      <div class="myworkspace-card hero-main">
        <div class="eyebrow">my workspace</div>
        <h1>My APK<br>Extension</h1>
      </div>
      <aside class="myworkspace-card side-note">
        <div class="value">첨부한 파일을 언제든 다시 내려받을 수 있도록 모아둔 챕터예요.</div>
      </aside>
    </section>
    <section class="tool-grid">
      <a class="myworkspace-card workspace-link" href="my-tab-customizer/">
        <div>
          <div class="icon">🗂️</div>
          <h2 class="workspace-title">My Tab Customizer</h2>
        </div>
        <div class="created">Chrome extension ZIP download</div>
      </a>

      <a class="myworkspace-card workspace-link" href="a-few-minutes-later/">
        <div>
          <img class="icon-image" src="logo.png" alt="A Few Minutes Later logo" />
          <h2 class="workspace-title">A Few Minutes Later</h2>
        </div>
        <div class="created">Current stable APK download</div>
      </a>
    </section>
  </main>
</body>
</html>
