<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructor</title>
  <link rel="stylesheet" href="../shared.css" />
  <style>
    body { overflow-x: hidden; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.55fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }
    .hero-main { position: relative; overflow: hidden; padding: clamp(24px, 5vw, 46px); }
    .hero-main::after {
      content: ""; position: absolute; right: -70px; top: -85px; width: 240px; height: 240px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,143,199,0.42), rgba(139,215,255,0.38));
    }
    .eyebrow {
      position: relative; z-index: 1; display: inline-flex; padding: 8px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.62); border: 1px solid var(--my-line); color: var(--my-muted);
      font-size: 0.9rem; margin-bottom: 14px;
    }
    h1 {
      position: relative; z-index: 1; margin: 0; font-size: clamp(2.6rem, 8vw, 5.8rem);
      line-height: 0.9; letter-spacing: -0.06em; color: #172033;
    }
    .side-note { padding: 22px; display: flex; flex-direction: column; justify-content: space-between; gap: 18px; }
    .side-note .value { font-size: 2rem; line-height: 1.1; letter-spacing: -0.05em; }
    .tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; }
    .workspace-link {
      min-height: 210px; padding: 18px; color: var(--my-ink); text-decoration: none;
      display: flex; flex-direction: column; justify-content: space-between;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }
    .workspace-link:hover {
      transform: translateY(-4px); filter: brightness(1.02);
      box-shadow: 0 24px 50px rgba(94,120,160,0.2);
    }
    .icon {
      width: 48px; height: 48px; display: grid; place-items: center; border-radius: 17px;
      background: rgba(255,255,255,0.68); border: 1px solid rgba(120,144,180,0.18); font-size: 1.55rem;
    }
    .workspace-title { margin: 18px 0 7px; font-size: 1.26rem; line-height: 1.2; letter-spacing: -0.04em; }
    .desc { margin: 0; color: var(--my-muted); font-size: 0.88rem; line-height: 1.5; }
    .created { margin-top: 18px; color: #7b8190; font-size: 0.8rem; }
    .lockbadge {
      display: inline-flex; align-items: center; gap: 5px; margin-left: 8px;
      padding: 3px 9px; border-radius: 999px; font-size: 0.72rem; vertical-align: middle;
      background: rgba(255,255,255,0.7); border: 1px solid var(--my-line); color: var(--my-muted);
    }
    @media (max-width: 980px) { .hero { grid-template-columns: 1fr; } }
    @media (max-width: 560px) { .workspace-link { min-height: 180px; } }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body class="myworkspace-soft">
  <nav class="myworkspace-topnav">
    <a class="myworkspace-home" href="../">← my workspace</a>
    <span class="myworkspace-date">Created Jun 23, 2026</span>
  </nav>
  <main class="myworkspace-page">
    <section class="hero">
      <div class="myworkspace-card hero-main">
        <div class="eyebrow">my workspace</div>
        <h1>Instructor</h1>
      </div>
      <aside class="myworkspace-card side-note">
        <div class="value">👩‍🏫</div>
      </aside>
    </section>
    <section class="tool-grid" aria-label="instructor list">
      <a class="myworkspace-card workspace-link" href="exam-major1/">
        <div>
          <div class="icon">🔐</div>
          <h2 class="workspace-title">Exam-major1</h2>
          <p class="desc">
            기출문제집 · 선생님의 전공1 강의 수강생에게만 제공되는 접근 키를 입력해야 열립니다<br />
            해당 자료는 주기적으로 업데이트되며 수강생들의 편의를 위해 주차별 학습 단원 기준으로 분류되어 있습니다<br />
            중간고사와 기말고사는 해당 자료의 문제 유형 기반으로 출제됩니다
          </p>
        </div>
        <div class="created">Last updated Jul 20, 2026</div>
      </a>
    </section>
  </main>
</body>
</html>
