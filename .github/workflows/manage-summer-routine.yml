name: Process Summer Routine Request

on:
  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

concurrency:
  group: summer-routine-json-update
  cancel-in-progress: false

jobs:
  reject-untrusted:
    name: Reject untrusted request
    if: startsWith(github.event.issue.title, '[Summer Routine]') && github.event.issue.user.login != github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Reject and close
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "이 자동 요청은 저장소 소유자 계정이 생성한 경우에만 처리됩니다."
          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason "not planned"

  update:
    name: Update routines.json
    if: startsWith(github.event.issue.title, '[Summer Routine]') && github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    outputs:
      commit_message: ${{ steps.update.outputs.commit_message }}
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Process prefilled Issue request
        id: update
        shell: bash
        run: |
          set -euo pipefail
          output="$(python3 scripts/process_summer_routine_issue.py --event "$GITHUB_EVENT_PATH")"
          printf '%s\n' "$output"
          commit_message="$(printf '%s\n' "$output" | sed -n 's/^COMMIT_MESSAGE=//p' | head -n 1)"
          if [[ -z "$commit_message" ]]; then
            echo "Commit message 생성에 실패했습니다." >&2
            exit 1
          fi
          echo "commit_message=$commit_message" >> "$GITHUB_OUTPUT"

      - name: Validate JSON
        run: python3 -m json.tool work/wellness/summer-routine/routines.json > /dev/null

      - name: Commit and push
        id: commit
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ steps.update.outputs.commit_message }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add work/wellness/summer-routine/routines.json
          if git diff --cached --quiet; then
            echo "변경 사항이 없습니다."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "$COMMIT_MESSAGE"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Complete request
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMIT_MESSAGE: ${{ steps.update.outputs.commit_message }}
          CHANGED: ${{ steps.commit.outputs.changed }}
        run: |
          if [[ "$CHANGED" == "true" ]]; then
            body="완료되었습니다. \`$COMMIT_MESSAGE\` 커밋을 생성했습니다. main push로 GitHub Pages 배포가 자동 시작됩니다."
          else
            body="요청은 정상 처리되었지만 실제 JSON 변경 사항은 없었습니다."
          fi
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$body"
          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason "completed"

      - name: Report failed request
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "자동 반영에 실패했습니다. Actions 실행 로그를 확인해 주세요: $RUN_URL"
