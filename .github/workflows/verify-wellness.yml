name: Verify Wellness Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Verify page separation and movement data
        run: python3 scripts/verify_wellness_separation.py
      - name: Check Summer Routine JavaScript
        run: |
          node --check work/wellness/summer-routine/app.js
          node --check work/wellness/summer-routine/sw.js
